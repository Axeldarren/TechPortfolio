    <script>
      // Set theme before first paint to avoid a light-mode flash for dark-theme users
      (function () {
        var stored = localStorage.getItem('portfolio-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
        document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#0e0c0a' : '#f7f6f3');
      })();
    </script>
